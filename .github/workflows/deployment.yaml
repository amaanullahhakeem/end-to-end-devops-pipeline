apiVersion: apps/v1
kind: Deployment
metadata:
  name: project1

spec:
  replicas: 2

  strategy:
    type: RollingUpdate

  selector:
    matchLabels:
      app: project1

  template:
    metadata:
      labels:
        app: project1

    spec:
      containers:
      - name: project1
        image: amaanullahhakeem/project1
        ports:
        - containerPort: 3000
